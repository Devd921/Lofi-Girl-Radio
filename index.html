<style>

header {
    text-align: center;
    padding: 1em 0;
}

.logo {
    width: 100px;
    height: auto;
}

body {
    background-color: #000000;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    margin: 0;
    padding: 0;
}

body.light-mode {
    background-color: white;
    color: black;
}

/* -- mode -- */

.mode-button {
    padding: 12px 25px;
    font-size: 18px;
    font-weight: bold;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
    background: linear-gradient(45deg, #3FA34D, #1E5631, #A3D9A5);
}

.mode-button:hover {
    transform: scale(1.1);
    opacity: 0.9;
}

/* -- bouton -- */

.duration-buttons {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 20px;
}

.duration-button {
    background: linear-gradient(45deg, #6A8DFF, #4C66F3, #304B99);
}

.video-buttons {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-bottom: 20px;
    align-items: center;
}

.video-button {
    width: 100%;
    max-width: 465px;
    background: linear-gradient(45deg, #D56BDA, #F78F66, #FFC8A2);
}

.duration-button, .video-button {
    padding: 12px 25px;
    font-size: 18px;
    font-weight: bold;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.duration-button:hover, .video-button:hover {
    transform: scale(1.1);
    opacity: 0.9;
}

.button-container {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* -- video -- */

.video-container {
    position: relative;
    width: 80%;
    padding-bottom: 45%;
    height: 0;
    flex-grow: 1;
    margin: 0 auto;
}

.video-container iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

#videoFrame {
    width: 100%;
    height: 100%;
    border: 3px solid white;
    border-radius: 15px;
    margin-bottom: 20px;
}

.light-mode #videoFrame {
    border-color: black; /* Bordure noire en mode clair */
}

/* -- minuteur -- */

#timerDisplay {
    font-size: 22px;
    font-weight: bold;
    margin-top: 20px;
}

 /* -- footer -- */

footer {
    background: linear-gradient(45deg, #D56BDA, #F78F66, #FFC8A2);
    color: white;
    text-align: center;
    padding: 20px;
    position: relative;
    bottom: -40px;
    width: 100%;
    font-size: 16px;
    box-sizing: border-box;
}

footer p {
    display: block;
    width: fit-content;
    margin: auto;
}

footer a {
    color: white;
    font-weight: bold;
    text-decoration: none;
}

footer a:hover {
    text-decoration: underline;
}

</style>

<!---->

<!------------------------------------------------>

<script>

let countdown;
let selectedDuration = 900000; // Valeur par défaut (15 min)

function setTimer(duration) {
    selectedDuration = duration;
}

function startVideo(videoId) {
    var videoFrame = document.getElementById('videoFrame');

    // Charger la vidéo immédiatement
    videoFrame.src = 'https://www.youtube.com/embed/' + videoId + '?vq=hd720&enablejsapi=1&rel=0';

    // Démarrer automatiquement le minuteur
    startTimer(selectedDuration);
}

function startTimer(duration) {
    clearInterval(countdown); // Réinitialise tout minuteur précédent

    let timeRemaining = duration / 1000;
    updateTimerDisplay(timeRemaining);

    countdown = setInterval(() => {
        timeRemaining--;
        updateTimerDisplay(timeRemaining);

        if (timeRemaining <= 0) {
            clearInterval(countdown);
            document.getElementById('videoFrame').src = ''; // Arrête la vidéo
        }
    }, 1000);
}

// Actualisation du minuteur

function updateTimerDisplay(seconds) {
    let minutes = Math.floor(seconds / 60);
    let secondsLeft = seconds % 60;
    document.getElementById('timerDisplay').innerText = `Minuteur : ${minutes}:${secondsLeft < 10 ? '0' : ''}${secondsLeft}`;
}

// Mode sombre et clair

document.getElementById("toggleMode").addEventListener("click", function () {
    document.body.classList.toggle("light-mode");

    var logo = document.getElementById("logo");
    var button = document.getElementById("toggleMode");

    if (document.body.classList.contains("light-mode")) {
        logo.src = "logo-light.png"; // Change le logo pour le mode clair
        button.textContent = "🌞 Mode clair"; // Texte du bouton mode clair
        button.style.background = "linear-gradient(45deg, #3FA34D, #1E5631, #A3D9A5)"; // Bordure noir en mode clair
    } else {
        logo.src = "logo-dark.png"; // Remet le logo sombre
        button.textContent = "🌙 Mode sombre"; // Texte du bouton mode sombre
        button.style.background = "linear-gradient(45deg, #3FA34D, #1E5631, #A3D9A5)"; // Couleur d'origine
        videoFrame.style.borderColor = "white"; // Bordure blanche en mode sombre
    }
});

</script>
